name: Deploy to GitHub Pages
description: Build the Astro site with Bun and publish dist/ via the official GitHub Pages actions.

outputs:
  page_url:
    description: Public URL of the deployed Pages site.
    value: ${{ steps.deploy.outputs.page_url }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      shell: bash
      run: bun install

    - name: Build Astro site
      shell: bash
      run: bun run build

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist

    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4
